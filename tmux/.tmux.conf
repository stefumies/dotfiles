set-option -g default-terminal 'tmux-256color'
set -as terminal-features ',*:RGB'

set -g prefix ^A
bind-key ^A send-prefix

set -g default-shell /bin/zsh
set -g default-command /bin/zsh

# Behaviour ----------------------------------------------------------------
set -g mouse on
setw -g mode-keys vi
setw -g aggressive-resize on
setw -g pane-base-index 1
set -g display-time 3000
set -g display-panes-time 2000
set -g status-interval 5
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off
setw -g monitor-activity on
set -g visual-activity off

# Copy-mode (vi) bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

# Quality-of-life bindings -------------------------------------------------
# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching without prefix
bind -n M-H previous-window
bind -n M-L next-window

# Swap windows left/right
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Break current pane into a new window / join a pane from another
bind b break-pane -d
bind @ command-prompt -p "join pane from:" "join-pane -s '%%'"

# Kill pane / window / session quickly (no confirm)
bind x kill-pane
bind X kill-window
bind Q kill-session

# For neovim tpipeline integration -----------------------------------------
set -g status-style bg=default
set -g status-left '#(cat #{socket_path}-\#{session_id}-vimbridge)'
set -g status-left-length 99
set -g status-right '#(cat #{socket_path}-\#{session_id}-vimbridge-R)'
set -g status-right-length 99
set -g status-justify centre


bind k send-keys C-l \; clear-history

# Keep new panes/windows in the current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display "Configuration Reloaded"

set -g base-index 1
set -g escape-time 0
set -g history-limit 10000000
set -g renumber-windows on


set-option -g status-position top


# Plugins ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-session-manager'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'seebi/tmux-colors-solarized'

# Resurrect / continuum: auto-save sessions every 15 min, restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @colors-solarized 'dark'


run ~/.tmux/plugins/tpm/tpm
